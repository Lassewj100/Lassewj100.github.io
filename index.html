<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<link href="https://fonts.googleapis.com/css2?family=Clear+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #faf8ef;
  font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 16px;
  min-height: 100vh;
}

header {
  width: 100%;
  max-width: 480px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.title {
  font-size: 56px;
  font-weight: 700;
  color: #776e65;
  line-height: 1;
}

.right-header {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}

.scores {
  display: flex;
  gap: 8px;
}

.score-box {
  background: #bbada0;
  border-radius: 6px;
  padding: 8px 14px;
  text-align: center;
  min-width: 72px;
}

.score-box .label {
  font-size: 10px;
  color: #eee4da;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.score-box .val {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  margin-top: 1px;
}

.btn-row {
  display: flex;
  gap: 8px;
}

button {
  background: #8f7a66;
  color: #f9f6f2;
  border: none;
  border-radius: 6px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 700;
  padding: 9px 18px;
  cursor: pointer;
  transition: background 0.1s;
}

button:hover { background: #7f6a56; }

.subtitle {
  width: 100%;
  max-width: 480px;
  font-size: 14px;
  color: #776e65;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.board-wrap {
  width: 100%;
  max-width: 480px;
  background: #bbada0;
  border-radius: 10px;
  padding: 10px;
  position: relative;
}

.grid-bg {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.cell-bg {
  background: rgba(238, 228, 218, 0.35);
  border-radius: 6px;
  aspect-ratio: 1;
}

.tiles-layer {
  position: absolute;
  top: 10px; left: 10px; right: 10px; bottom: 10px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  pointer-events: none;
}

.tile {
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  animation: appear 0.1s ease;
}

@keyframes appear {
  from { transform: scale(0); }
  to   { transform: scale(1); }
}

@keyframes merge {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.12); }
  100% { transform: scale(1); }
}

.tile.merged { animation: merge 0.15s ease; }

.tile[data-val="2"]    { background: #eee4da; color: #776e65; font-size: 36px; }
.tile[data-val="4"]    { background: #ede0c8; color: #776e65; font-size: 36px; }
.tile[data-val="8"]    { background: #f2b179; color: #f9f6f2; font-size: 36px; }
.tile[data-val="16"]   { background: #f59563; color: #f9f6f2; font-size: 32px; }
.tile[data-val="32"]   { background: #f67c5f; color: #f9f6f2; font-size: 32px; }
.tile[data-val="64"]   { background: #f65e3b; color: #f9f6f2; font-size: 32px; }
.tile[data-val="128"]  { background: #edcf72; color: #f9f6f2; font-size: 26px; }
.tile[data-val="256"]  { background: #edcc61; color: #f9f6f2; font-size: 26px; }
.tile[data-val="512"]  { background: #edc850; color: #f9f6f2; font-size: 26px; }
.tile[data-val="1024"] { background: #edc53f; color: #f9f6f2; font-size: 22px; }
.tile[data-val="2048"] { background: #edc22e; color: #f9f6f2; font-size: 22px; }
.tile[data-val="high"] { background: #3c3a32; color: #f9f6f2; font-size: 18px; }

.overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(238, 228, 218, 0.73);
  border-radius: 10px;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  z-index: 10;
}

.overlay.show { display: flex; }

.overlay-title {
  font-size: 42px;
  font-weight: 700;
  color: #776e65;
}

.overlay-sub {
  font-size: 15px;
  color: #776e65;
}

.overlay-btns { display: flex; gap: 10px; }

.how-to {
  margin-top: 14px;
  font-size: 13px;
  color: #b0a89e;
  text-align: center;
  line-height: 1.9;
}
</style>
</head>
<body>

<header>
  <div class="title">2048</div>
  <div class="right-header">
    <div class="scores">
      <div class="score-box">
        <div class="label">Score</div>
        <div class="val" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="label">Best</div>
        <div class="val" id="best">0</div>
      </div>
    </div>
    <div class="btn-row">
      <button onclick="undoMove()">Undo</button>
      <button onclick="newGame()">New Game</button>
    </div>
  </div>
</header>

<div class="subtitle">
  <span>Join the tiles, get to <strong>2048!</strong></span>
</div>

<div class="board-wrap" id="board-wrap">
  <div class="grid-bg" id="grid-bg"></div>
  <div class="tiles-layer" id="tiles-layer"></div>
  <div class="overlay" id="overlay">
    <div class="overlay-title" id="overlay-title"></div>
    <div class="overlay-sub" id="overlay-sub"></div>
    <div class="overlay-btns">
      <button onclick="newGame()">Try again</button>
      <button id="overlay-continue" onclick="continueGame()" style="display:none">Keep going</button>
    </div>
  </div>
</div>

<div class="how-to">
  Use your <strong>arrow keys</strong> to move the tiles.<br>
  Tiles with the same number <strong>merge into one!</strong>
</div>

<script>
const SIZE = 4;
let board, score, best, history, won, continued;

function init() {
  best = parseInt(localStorage.getItem('2048best') || '0');
  document.getElementById('best').textContent = best;
  for (let i = 0; i < SIZE * SIZE; i++) {
    const c = document.createElement('div');
    c.className = 'cell-bg';
    document.getElementById('grid-bg').appendChild(c);
  }
  newGame();
}

function newGame() {
  board = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  score = 0; won = false; continued = false; history = [];
  updateScore(0);
  hideOverlay();
  addTile(); addTile();
  render();
}

function addTile() {
  const empty = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (!board[r][c]) empty.push([r, c]);
  if (!empty.length) return false;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  board[r][c] = Math.random() < 0.9 ? 2 : 4;
  return true;
}

function render(mergedCells = []) {
  const layer = document.getElementById('tiles-layer');
  layer.innerHTML = '';
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const v = board[r][c];
      if (!v) continue;
      const tile = document.createElement('div');
      tile.className = 'tile';
      if (mergedCells.some(m => m[0] === r && m[1] === c)) tile.classList.add('merged');
      tile.setAttribute('data-val', v > 2048 ? 'high' : v);
      tile.textContent = v;
      tile.style.gridRow = r + 1;
      tile.style.gridColumn = c + 1;
      layer.appendChild(tile);
    }
  }
}

function saveHistory() {
  history.push({ board: board.map(r => [...r]), score });
  if (history.length > 5) history.shift();
}

function undoMove() {
  if (!history.length) return;
  const prev = history.pop();
  board = prev.board; score = prev.score;
  updateScore(score); render();
}

function move(dir) {
  saveHistory();
  let moved = false;
  const merged = [];
  const times = {left:0, up:1, right:2, down:3}[dir];
  for (let i = 0; i < times; i++) board = rotateRight(board);
  for (let r = 0; r < SIZE; r++) {
    let row = board[r].filter(v => v);
    for (let i = 0; i < row.length - 1; i++) {
      if (row[i] === row[i+1]) {
        row[i] *= 2; score += row[i];
        if (row[i] === 2048 && !won && !continued) { won = true; setTimeout(() => showOverlay('win'), 300); }
        row.splice(i+1, 1); moved = true;
      }
    }
    while (row.length < SIZE) row.push(0);
    if (row.join() !== board[r].join()) moved = true;
    board[r] = row;
  }
  for (let i = 0; i < (4 - times) % 4; i++) board = rotateRight(board);
  if (moved) {
    updateScore(score); addTile(); render(merged);
    if (!canMove()) setTimeout(() => showOverlay('lose'), 300);
  } else { history.pop(); }
}

function rotateRight(b) {
  return b[0].map((_, c) => b.map(r => r[c]).reverse());
}

function canMove() {
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++) {
      if (!board[r][c]) return true;
      if (c < SIZE-1 && board[r][c] === board[r][c+1]) return true;
      if (r < SIZE-1 && board[r][c] === board[r+1][c]) return true;
    }
  return false;
}

function updateScore(s) {
  score = s;
  document.getElementById('score').textContent = s;
  if (s > best) { best = s; localStorage.setItem('2048best', best); document.getElementById('best').textContent = best; }
}

function showOverlay(type) {
  const title = document.getElementById('overlay-title');
  const sub = document.getElementById('overlay-sub');
  const cont = document.getElementById('overlay-continue');
  if (type === 'win') {
    title.textContent = 'You win!';
    sub.textContent = 'You reached 2048! Keep going or start over.';
    cont.style.display = 'inline-block';
  } else {
    title.textContent = 'Game over!';
    sub.textContent = 'Final score: ' + score;
    cont.style.display = 'none';
  }
  document.getElementById('overlay').classList.add('show');
}

function hideOverlay() { document.getElementById('overlay').classList.remove('show'); }
function continueGame() { continued = true; hideOverlay(); }

document.addEventListener('keydown', e => {
  const map = {ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down'};
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

let tx, ty;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, {passive:true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
  if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
  else move(dy > 0 ? 'down' : 'up');
}, {passive:true});

init();
</script>
</body>
</html>
